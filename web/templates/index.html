<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw Royale - Bot Monitor</title>
    <link rel="stylesheet" href="/static/style.css?v=1720099200" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Claw Royale Agent Dashboard</h1>
        <div class="system-status">
          <span class="status-indicator"></span>
          System Online
        </div>
      </header>

      <!-- Summary Cards -->
      <section class="summary-cards">
        <div class="card">
          <h3>VERSION</h3>
          <p id="system-version">Ver 1.12.0</p>
        </div>
        <div class="card">
          <h3>CONNECTION</h3>
          <p id="connection-status" class="status-success">Successful</p>
        </div>
        <div class="card">
          <h3>ACTIVE BOTS</h3>
          <p id="active-bots">0</p>
        </div>
      </section>

      <!-- Bot List Table -->
      <section class="table-section">
        <table>
          <thead>
            <tr>
              <th>Agent</th>
              <th>Redeem</th>
              <th>sMoltz</th>
              <th>Target</th>
              <th>Room</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bot-tbody">
            <!-- Bot status rows will be inserted here -->
          </tbody>
        </table>
      </section>

      <section class="log-section">
        <div class="log-header">
          <h2>Live Gameplay Log</h2>
          <div class="log-controls">
            <select id="bot-select">
              <option value="">Select Bot</option>
            </select>
            <label class="scroll-lock">
              <input type="checkbox" id="auto-scroll-check" checked />
              Auto Scroll
            </label>
            <button id="copy-log-btn" class="copy-btn">Copy Log</button>
          </div>
        </div>
        <div id="log-viewer" class="log-viewer"></div>
      </section>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>
    <script src="/static/script.js"></script>
  </body>
</html>
