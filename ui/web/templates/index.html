<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw Arena - Live Monitor</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar: Daftar Bot -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h2>Claw Arena</h2>
          <p>Live Bots Monitor</p>
        </div>

        <!-- Widget Total sMoltz Global -->
        <div
          id="total-smoltz-container"
          hx-get="/api/bots"
          hx-trigger="load, every 5s"
          hx-target="#bots-list"
          hx-swap="innerHTML"
        >
          <!-- Total sMoltz akan disuntikkan secara dinamis -->
        </div>

        <div class="bots-list-container" id="bots-list">
          <!-- Daftar bot akan dimuat di sini oleh HTMX -->
        </div>
      </div>

      <!-- Main Content: Terminal Log Real-time -->
      <div class="main-content" id="dashboard-detail">
        <div class="no-selection">
          Silakan pilih bot di sebelah kiri untuk memantau status.
        </div>
      </div>
    </div>

    <!-- Template Block HTMX -->
    <template id="BOT_ITEM">
      <button
        class="bot-item {active_class}"
        hx-get="/api/bot/{name}"
        hx-target="#dashboard-detail"
        hx-push-url="false"
        onclick="setActiveBot('{name}')"
      >
        <div class="bot-header-info">
          <span class="bot-name-label">{name} ({status_text})</span>
        </div>
        <div class="bot-summary" style="margin-bottom: 2px; color: #ffbc40">
          sMoltz Balance: {balance}
        </div>
        <div class="bot-summary">
          PreSeason 1: {season_points} Pts | Rank: {rank}
        </div>
        <div class="bot-summary">HP: {hp}/{max_hp} | EP: {ep}/{max_ep}</div>
        <div class="bot-summary">Kills: {kills} | Turn: {turn}</div>
        <div class="bot-room-badge">{room_name}</div>
      </button>
    </template>

    <template id="BOT_DETAIL">
      <div
        class="detail-container"
        hx-get="/api/bot/{name}?current_turn={turn}&log_count={log_count}"
        hx-trigger="every 2s"
        hx-target="#dashboard-detail"
        hx-swap="innerHTML"
      >
        <div class="detail-header">
          <h2>Terminal Log: {name}</h2>
          <div class="turn-counter">Turn {turn}</div>
        </div>

        <textarea class="logs-box" id="terminal-logs" readonly>
{logs_str}</textarea
        >
      </div>
    </template>

    <script>
      let userScrolled = false;
      let activeBot = "";
      let savedScrollTop = 0;

      function setActiveBot(name) {
        activeBot = name;
        userScrolled = false;
        savedScrollTop = 0;
        const detail = document.getElementById("dashboard-detail");
        if (detail) {
          detail.innerHTML = '<div class="loading">Loading logs...</div>';
        }
      }

      document.addEventListener(
        "scroll",
        function (evt) {
          if (evt.target.id === "terminal-logs") {
            const t = evt.target;
            if (t.scrollHeight - t.scrollTop > t.clientHeight + 10) {
              userScrolled = true;
            } else {
              userScrolled = false;
            }
          }
        },
        true,
      );

      document.addEventListener("htmx:beforeSwap", function (evt) {
        if (evt.detail.target.id === "dashboard-detail") {
          const oldTerminal = document.getElementById("terminal-logs");
          if (oldTerminal) {
            savedScrollTop = oldTerminal.scrollTop;
          }
        }
      });

      document.addEventListener("htmx:afterRequest", function (evt) {
        if (evt.detail.target.id === "dashboard-detail") {
          const terminal = document.getElementById("terminal-logs");
          if (terminal) {
            if (!userScrolled) {
              terminal.scrollTop = terminal.scrollHeight;
            } else {
              terminal.scrollTop = savedScrollTop;
            }
          }
        }
      });
    </script>
  </body>
</html>
