<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw Royale Agent Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <header class="dashboard-header">
        <h1>Claw Royale Agent Dashboard</h1>
        <div class="server-status">
          <span class="status-dot online"></span>
          <span>System Online</span>
        </div>
      </header>

      <section class="meta-section">
        <div class="meta-card">
          <h3>Version</h3>
          <p>Ver 1.12.0</p>
        </div>
        <div class="meta-card">
          <h3>Connection</h3>
          <p class="success-text">Successful</p>
        </div>
        <div class="meta-card">
          <h3>Active Bots</h3>
          <p id="active-bots-count">-</p>
        </div>
      </section>

      <section class="table-section">
        <table class="status-table">
          <thead>
            <tr>
              <th>Agent</th>
              <th>Redeem</th>
              <th>Weekly</th>
              <th>sMoltz</th>
              <th>Target</th>
              <th>Room</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bots-table-body"></tbody>
        </table>
      </section>

      <footer class="dashboard-footer">
        <p>All Setup ready to play ...</p>
      </footer>
    </div>
    <script src="/static/script.js"></script>
  </body>
</html>
